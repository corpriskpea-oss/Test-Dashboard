<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Enterprise Risk Dashboard – v.final.1.00</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
<div class="layout">

<!-- ================= Top Navigation ================= -->
<nav class="top-nav">
  <div class="nav-container">

    <div class="nav-left">
      <span class="nav-back">◀</span>
      <span class="nav-logo">Enterprise Risk</span>
    </div>

    <div class="nav-menu">
      <button class="nav-item active">Plan</button>
      <button class="nav-item">KRI</button>
      <button class="nav-item">Risk Matrix</button>
      <button class="nav-item">Risk Response</button>
    </div>

    <div class="nav-right">
      <span class="nav-icon">🔍</span>
      <span class="nav-icon">👤</span>
    </div>

  </div>
</nav>

  <!-- ================= Main Content ================= -->
  <main class="content" style="display:flex; flex-direction:column;">

    <!-- Iframe Area -->
    <iframe
      id="mainFrame"
      src="plan.html"
      style="flex:1; border-radius:12px;"
    ></iframe>

  </main>

</div>

<!-- ================= Script ================= -->
<script>
function loadPage(page, btn){
  document.getElementById("mainFrame").src = page;

  document.querySelectorAll(".sidebar button")
    .forEach(b => b.classList.remove("active"));

  btn.classList.add("active");
}
</script>

</body>
</html>
