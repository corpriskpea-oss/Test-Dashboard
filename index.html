<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Enterprise Risk Dashboard – v.final.1.00</title>

  <!-- Font Awesome -->
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- ===== Top-left Title ===== -->
<div class="top-title">
  PEA Risk Management
</div>

<!-- ================= Icon Menu ================= -->
<ul class="icon-menu">

  <li class="icon active"
      onclick="loadPage('plan.html', this)">
    <span class="tooltip">Plan</span>
    <i class="fas fa-clipboard-list"></i>
  </li>

  <li class="icon"
      onclick="loadPage('kri.html', this)">
    <span class="tooltip">KRI</span>
    <i class="fas fa-chart-column"></i>
  </li>

  <li class="icon"
      onclick="loadPage('matrix.html', this)">
    <span class="tooltip">Risk Matrix</span>
    <i class="fas fa-border-all"></i>
  </li>

  <li class="icon"
      onclick="loadPage('risk-response.html', this)">
    <span class="tooltip">Risk Response</span>
    <!-- ✅ Icon ใหม่ -->
    <i class="fas fa-magnifying-glass-chart"></i>
  </li>

</ul>

<!-- ================= Main Content ================= -->
<main class="content">
  <iframe
    id="mainFrame"
    src="plan.html">
  </iframe>
</main>

<!-- ================= Script ================= -->
<script>
function loadPage(page, el){
  document.getElementById("mainFrame").src = page;

  document.querySelectorAll(".icon-menu .icon")
    .forEach(i => i.classList.remove("active"));

  el.classList.add("active");
}
</script>

</body>
</html>
