<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Enterprise Risk Dashboard – v.final.1.00</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="layout">

  <!-- ================= Top Navigation ================= -->
  <nav class="top-nav">
    <div class="nav-container">

      <div class="nav-left">
        <span class="nav-logo">Enterprise Risk</span>
      </div>

      <div class="nav-menu">
        <button class="nav-item active"
                onclick="loadPage('plan.html', this)">
          Plan
        </button>

        <button class="nav-item"
                onclick="loadPage('kri.html', this)">
          KRI
        </button>

        <button class="nav-item"
                onclick="loadPage('matrix.html', this)">
          Risk Matrix
        </button>

        <button class="nav-item"
                onclick="loadPage('risk-response.html', this)">
          Risk Response
        </button>
      </div>

    </div>
  </nav>

  <!-- ================= Main Content ================= -->
  <main class="content" style="margin-top:100px;">

    <iframe
      id="mainFrame"
      src="plan.html"
      style="width:100%; height:calc(100vh - 120px); border:none; border-radius:12px;">
    </iframe>

  </main>

</div>

<!-- ================= Script ================= -->
<script>
function loadPage(page, btn){
  // เปลี่ยนหน้าใน iframe
  document.getElementById("mainFrame").src = page;

  // ลบ active ออกจากเมนูทั้งหมด
  document.querySelectorAll(".nav-item")
    .forEach(b => b.classList.remove("active"));

  // ใส่ active ให้ปุ่มที่กด
  btn.classList.add("active");
}
</script>

</body>
</html>
