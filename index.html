<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Enterprise Risk Dashboard – v.final.1.00</title>

  <!-- Font Awesome -->
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- ================= Icon Menu ================= -->
<ul class="icon-menu">
  <li class="icon active"
      onclick="loadPage('plan.html', this)">
    <span class="tooltip">Plan</span>
    <i class="fas fa-clipboard-list"></i>
  </li>

  <li class="icon"
      onclick="loadPage('kri.html', this)">
    <span class="tooltip">KRI</span>
    <i class="fas fa-chart-column"></i>
  </li>

  <li class="icon"
      onclick="loadPage('matrix.html', this)">
    <span class="tooltip">Risk Matrix</span>
    <i class="fas fa-border-all"></i>
  </li>

  <li class="icon"
      onclick="loadPage('risk-response.html', this)">
    <span class="tooltip">Risk Response</span>
    <i class="fas fa-rotate"></i>
  </li>
</ul>

<!-- ================= Main Content ================= -->
<main class="content">

  <iframe
    id="mainFrame"
    src="plan.html"
    style="width:100%; height:100%; border:none; border-radius:18px;">
  </iframe>

</main>

<!-- ================= Script ================= -->
<script>
function loadPage(page, el){
  // เปลี่ยนหน้า iframe
  document.getElementById("mainFrame").src = page;

  // ลบ active ทั้งหมด
  document.querySelectorAll(".icon-menu .icon")
    .forEach(i => i.classList.remove("active"));

  // ใส่ active ตัวที่กด
  el.classList.add("active");
}
</script>

</body>
</html>
